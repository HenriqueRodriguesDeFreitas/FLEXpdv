spring:
  application:
    name: flexpdv

  datasource:
    url: jdbc:postgresql://localhost:5432/flexpdv
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    logging:
      level:
        org.flywaydb: DEBUG