spring:
  application:
    name: flexpdv

  datasource:
    url: jdbc:postgresql://localhost:5432/flexpdv
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    show-sql: true
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

logging:
    level:
      org.flywaydb: DEBUG